<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Argos Segurança AI | CNAK Vision</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<aside class="sidebar">
    <div class="brand">
        <img src="{{ url_for('static', filename='img/argos-logo.jpg') }}" alt="Argos Segurança" class="brand-logo">
    </div>
    <nav class="menu">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}"><span>⌂</span> Dashboard</a>
        <a href="/usuarios" class="{% if request.path.startswith('/usuarios') %}active{% endif %}"><span>♙</span> Usuários</a>
        <a href="/modulos" class="{% if request.path.startswith('/modulos') %}active{% endif %}"><span>⬡</span> Módulos</a>
        <a href="/ambientes" class="{% if request.path.startswith('/ambientes') %}active{% endif %}"><span>▥</span> Ambientes</a>
    </nav>
    <div class="system-card">
        <strong>Sistema Seguro</strong>
        <small>Todos os sistemas operacionais</small>
    </div>
    <div class="client-card">
        <p>Cliente: <strong>CNAK Vision</strong></p>
        <small>Versão 1.0.0</small>
    </div>
</aside>
<main class="main">
    <header class="topbar">
        <div class="hamburger">☰</div>
        <div class="admin"><span>☼</span><span>🔔</span><strong>AD</strong><span>Administrador</span></div>
    </header>
    {% block content %}{% endblock %}
</main>
</body>
</html>
